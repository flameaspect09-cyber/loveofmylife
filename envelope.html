<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Letter</title>

<style>
body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #ffe6e6;
  font-family: cursive;
  padding: 20px;
  box-sizing: border-box;
  overflow-x: hidden;
}

/* glow background */
body::before {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #ff69b4 0%, transparent 70%);
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0.25;
  filter: blur(50px);
  z-index: -1;
}

/* floating hearts */
.hearts::before,
.hearts::after {
  content: "💖 💕 💖 💕 💖";
  position: fixed;
  top: 100%;
  left: 50%;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.6;
}

.hearts::after {
  animation-delay: 3s;
  left: 30%;
}

@keyframes floatUp {
  from { transform: translateY(0); }
  to { transform: translateY(-120vh); }
}

/* envelope container */
.envelope-container {
  position: relative;
  width: 450px;
  max-width: 95%;
  cursor: pointer;
}

/* envelope */
.envelope {
  width: 100%;
  background: #fff0f5;
  border: 2px solid #ff69b4;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}

/* flap */
.envelope::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 225px solid transparent;
  border-right: 225px solid transparent;
  border-bottom: 140px solid #ff69b4;
  transform-origin: top center;
  transition: transform 2.5s ease;
}

/* letter */
.letter {
  position: relative;
  width: 100%;
  background: #fffaf0;
  border-top: 2px solid #ff69b4;
  padding: 30px;
  box-sizing: border-box;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: all 1.5s ease;
  text-align: center;
  font-size: 18px;
  line-height: 1.5;
}

/* OPEN STATE */
.envelope-container.open .letter {
  opacity: 1;
  max-height: 900px;
}

.envelope-container.open .envelope::before {
  transform: rotateX(180deg);
}

/* typewriter cursor */
#typed {
  border-right: 2px solid #ff1493;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* bounce text */
.open-text {
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  color: #ff1493;
  font-weight: bold;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}

/* BUTTON */
.btn-link {
  display: block;
  margin-top: 60px;
  padding: 12px 20px;
  background: #ff69b4;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>
<h1 style="margin-bottom:20px;">Chapter 3: My Letter 💌</h1>
<div class="hearts"></div>

<div class="envelope-container">
  <div class="envelope">
    <div class="letter">
      <span id="typed"></span>
    </div>
  </div>

  <div class="open-text">Open this 💌</div>
</div>

<!-- BUTTON (FIXED) -->
<button class="btn-link" onclick="goToForm()">
  Go to Marriage Form 💍
</button>

<audio id="loveSound" src="love (4).mp3" preload="auto"></audio>

<script>
const envelope = document.querySelector('.envelope-container');
const sound = document.getElementById('loveSound');
const typed = document.getElementById("typed");

const text = `💌 To My LOML,

Happy 1st Monthsarry baby!!!!! Ang bilis nang panahon, parang kailan lang hindi pa tayo magkakilala, ngayon 1st monthsarry na natin.

Nung una hindi ko ineexpect na mapunta sa'yo, na maging tayo. I know we've been through a lot lately, madalas tayong hindi mag ka-intindihan. Akala ko infatuated ka lang, akala ko hindi ka seryoso sa'kin. Pero I hope you know baby na hindi na kita susukuan ulit, wag lang may third party, wag lang tayong bumitaw sa isa't isa. Kinikilala pa kita at mas gusto kitang kilalanin lalo.

Nakikita ko kung gano mo ako ka-mahal, nakikita ko lahat nang efforts mo, mula sa simple updates, sa panlilibre at pag rarant mo sa'kin, na a-appreciate ko lahat nang 'yon. Hindi man ako vocal, pero nakikita ko kung gano ka kahanda ibigay lahat para sakin.

I hope na sana mas tumagal pa tayo, I hope na kahit gano kahirap at ka imposible ay hindi tayo susuko, sana samahan mo'ko palagi kahit zero days ako.

Ash sana 'wag kang sumuko, sana 'wag kang bumitaw, sana samahan mo pa rin ako in finding the answers to all the how's, hanggang maging endgame tayo :))

I love you more than words can express. 💞`;

let i = 0;

function typeWriter() {
  if (i < text.length) {
    typed.innerHTML += (text[i] === "\n") ? "<br>" : text[i];
    i++;
    setTimeout(typeWriter, 44);
  }
}

envelope.addEventListener('click', () => {
  if (!envelope.classList.contains('open')) {

    envelope.classList.add('open');

    sound.pause();
    sound.currentTime = 0;
    sound.play();

    typed.innerHTML = "";
    i = 0;

    typeWriter();
  }
});

/* FIXED NAVIGATION */
function goToForm() {
  window.location.href = "marriageform.html";
}

</script>

</body>
</html>

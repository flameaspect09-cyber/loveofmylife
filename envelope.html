<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Letter</title>
<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #ffe6e6; /* light romantic background */
  font-family: cursive;
}

.envelope-container {
  position: relative;
  width: 300px;
  height: 200px;
  cursor: pointer;
}

.envelope {
  width: 100%;
  height: 100%;
  background: #fff0f5;
  border: 2px solid #ff69b4;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  transition: transform 0.8s ease;
}

.envelope::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 150px solid transparent;
  border-right: 150px solid transparent;
  border-bottom: 100px solid #ff69b4; /* envelope flap color */
  transition: transform 0.8s ease;
  transform-origin: top center;
}

.envelope:hover::before {
  transform: rotateX(180deg); /* flap opens on hover */
}

.letter {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fffaf0;
  border: 2px solid #ff69b4;
  padding: 20px;
  box-sizing: border-box;
  opacity: 0;
  transition: top 0.8s ease, opacity 0.8s ease;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.envelope:hover .letter {
  top: 0;
  opacity: 1;
}

.open-text {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  color: #ff1493;
  font-weight: bold;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}
</style>
</head>
<body>

<div class="envelope-container">
  <div class="envelope">
    <div class="letter">
      💌 My Dearest,  
      <br>  
      I love you more than words can express.  
      <br>  
      Forever yours 💞
    </div>
  </div>
  <div class="open-text">Open this 💌</div>
</div>

</body>
</html>
